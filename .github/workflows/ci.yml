name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    name: Windows Release Build
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release --target LLMUsageTray

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LLMUsageTray-windows-x64
          path: build/Release/LLMUsageTray.exe
          if-no-files-found: error

  macos:
    name: macOS Release Build
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --target LLMUsageTray

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LLMUsageTray-macos
          path: build/LLMUsageTray
          if-no-files-found: error

  linux:
    name: Linux Release Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: >
          sudo apt-get update &&
          sudo apt-get install -y
          libcurl4-openssl-dev
          libsecret-tools
          libx11-dev
          libxext-dev
          libxrandr-dev
          libxcursor-dev
          libxfixes-dev
          libxtst-dev
          libxi-dev
          libxss-dev
          libwayland-dev
          libxkbcommon-dev
          wayland-protocols
          libdbus-1-dev
          libudev-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --target LLMUsageTray

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LLMUsageTray-linux-x64
          path: build/LLMUsageTray
          if-no-files-found: error
